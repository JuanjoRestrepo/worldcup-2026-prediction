name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    name: Test and dbt Validation
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: worldcup
          POSTGRES_PASSWORD: worldcup_dev
          POSTGRES_DB: worldcup_db
        options: >-
          --health-cmd "pg_isready -U worldcup -d worldcup_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: worldcup_db
      POSTGRES_USER: worldcup
      POSTGRES_PASSWORD: worldcup_dev
      DBT_BASE_SCHEMA: analytics

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Sync project dependencies
        run: uv sync

      - name: Initialize database schema
        env:
          PGPASSWORD: worldcup_dev
        run: |
          psql \
            -h localhost \
            -U worldcup \
            -d worldcup_db \
            -f docker/postgres/init.sql

      - name: Run pytest
        run: uv run python -m pytest tests/ -v --tb=short

      - name: Validate dbt project syntax
        run: uv run python run_dbt.py parse

      - name: Comment PR with test results
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ CI pipeline failed.\n\nThe blocking validation suite did not pass. Please review the workflow logs before merging.'
            })
