services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-wc_user}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-wc_password}"
      POSTGRES_DB: "${POSTGRES_DB:-wc_db}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wc_user} -d ${POSTGRES_DB:-wc_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres:/docker-entrypoint-initdb.d:ro

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: "${POSTGRES_DB:-wc_db}"
      POSTGRES_USER: "${POSTGRES_USER:-wc_user}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-wc_password}"
      DBT_BASE_SCHEMA: "${DBT_BASE_SCHEMA:-analytics}"
      DATA_DIR: /app/data
      MODEL_ARTIFACT_PATH: /app/models/match_predictor.joblib
      API_HOST: 0.0.0.0
      API_PORT: 8000
      PREDICTION_FEATURE_SOURCE: auto
      MONITORING_SOURCE: auto
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data:ro
      - ./models:/app/models:ro

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_URL: http://api:8000
      ADMIN_API_KEY: "${ADMIN_API_KEY:-worldcup2026_super_secret_admin_key}"
    ports:
      - "8501:8501"

volumes:
  postgres_data:
