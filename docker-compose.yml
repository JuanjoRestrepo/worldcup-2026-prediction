services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-wc_user}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-wc_password}"
      POSTGRES_DB: "${POSTGRES_DB:-wc_db}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wc_user} -d ${POSTGRES_DB:-wc_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres:/docker-entrypoint-initdb.d:ro

volumes:
  postgres_data:
