services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-wc_user}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-wc_password}"
      POSTGRES_DB: "${POSTGRES_DB:-wc_db}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wc_user} -d ${POSTGRES_DB:-wc_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres:/docker-entrypoint-initdb.d:ro

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: "${POSTGRES_DB:-wc_db}"
      POSTGRES_USER: "${POSTGRES_USER:-wc_user}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-wc_password}"
      DATA_DIR: /app/data
      MODEL_ARTIFACT_PATH: /app/models/match_predictor.joblib
      API_HOST: 0.0.0.0
      API_PORT: 8000
      PREDICTION_FEATURE_SOURCE: auto
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data:ro
      - ./models:/app/models:ro

volumes:
  postgres_data:
