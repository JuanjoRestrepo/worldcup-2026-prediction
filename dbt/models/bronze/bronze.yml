version: 2

models:
  - name: bronze_all_matches
    description: "Unified bronze-layer view across historical CSV loads and API snapshots."
    columns:
      - name: match_date
        tests:
          - not_null
      - name: home_team
        tests:
          - not_null
      - name: away_team
        tests:
          - not_null
      - name: source_stream
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['historical', 'api']
